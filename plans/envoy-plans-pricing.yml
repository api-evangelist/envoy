specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Envoy
providerId: envoy
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud Native
  - Service Mesh
  - Proxy
  - Open Source
description: Envoy is a CNCF-graduated open-source edge and service proxy. The project itself is free
  software (Apache 2.0); there is no commercial pricing for the Envoy Admin API, xDS APIs, Envoy API V3,
  Envoy Gateway, or Envoy AI Gateway. Commercial support / managed offerings are available from third-party
  vendors (e.g. Tetrate, Solo.io, cloud providers) under their own pricing — not from the Envoy project.
sources:
  - https://www.envoyproxy.io/
  - https://github.com/envoyproxy/envoy
  - https://www.cncf.io/projects/envoy/
plans:
  - id: envoy-open-source
    name: Envoy Open Source
    type: freemium
    description: The Envoy proxy and its APIs are licensed under Apache License 2.0. Anyone can run, modify,
      and distribute Envoy at no cost. Operating Envoy at scale incurs only the underlying infrastructure
      cost, which is paid to the chosen cloud or hardware vendor, not to the Envoy project.
    entries:
      - label: Software License
        name: license
        type: flat
        metric: license
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Admin API / xDS / API V3 / Gateway / AI Gateway
        name: api_access
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Apache 2.0 License
      - name: CNCF Graduated Project
      - name: Community Support (Slack, GitHub, mailing list)
      - name: Envoy Admin API
      - name: Envoy xDS APIs
      - name: Envoy API V3
      - name: Envoy Gateway API
      - name: Envoy AI Gateway API
  - id: envoy-third-party-commercial-support
    name: Third-Party Commercial Support
    type: enterprise
    description: Commercial support, managed Envoy/Istio platforms, and enterprise distributions are sold
      by independent vendors (Tetrate, Solo.io, cloud providers) under their own pricing. These offerings
      are not part of the Envoy project.
    entries:
      - label: Vendor Support / Managed Service
        name: vendor_support
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see vendor pricing
        userMultiplied: false
    elements:
      - name: Vendor SLA
      - name: Vendor Distribution
      - name: Vendor Managed Service
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
