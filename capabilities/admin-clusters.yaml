naftiko: 1.0.0-alpha2
info:
  label: Envoy Admin API — Clusters
  description: 'Envoy Admin API — Clusters. 1 operations. Lead operation: Envoy Get upstream cluster information. Self-contained
    Naftiko capability covering one Envoy business surface.'
  tags:
  - Envoy
  - Clusters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVOY_API_KEY: ENVOY_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-clusters
    baseUri: http://localhost:9901
    description: Envoy Admin API — Clusters business capability. Self-contained, no shared references.
    resources:
    - name: clusters
      path: /clusters
      operations:
      - name: getclusters
        method: GET
        description: Envoy Get upstream cluster information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: admin-clusters-rest
    port: 8080
    description: REST adapter for Envoy Admin API — Clusters. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/clusters
      name: clusters
      description: REST surface for clusters.
      operations:
      - method: GET
        name: getclusters
        description: Envoy Get upstream cluster information
        call: admin-clusters.getclusters
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-clusters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envoy Admin API — Clusters. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: envoy-get-upstream-cluster-information
      description: Envoy Get upstream cluster information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-clusters.getclusters
      outputParameters:
      - type: object
        mapping: $.
