aid: envoy
name: Envoy
description: >-
  Envoy is a high-performance, open-source edge and service proxy designed for
  cloud-native applications and microservice architectures. It provides advanced
  load balancing, observability, and traffic management features, and serves as
  the data plane for many service mesh implementations including Istio.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Proxy
  - Service Mesh
  - Load Balancing
  - Cloud Native
url: https://www.envoyproxy.io/
created: '2025-01-01'
modified: '2026-03-16'
position: Consumer
access: 3rd-Party
specificationVersion: '0.19'
apis:
  - aid: envoy:envoy-admin-api
    name: Envoy Admin API
    description: >-
      The Envoy Admin API provides local administrative access to a running
      Envoy proxy instance, exposing endpoints for inspecting clusters, listeners,
      configuration, statistics, health status, and runtime settings.
    humanURL: https://www.envoyproxy.io/docs/envoy/latest/operations/admin
    tags:
      - Admin
      - Management
      - Observability
    properties:
      - type: Documentation
        url: https://www.envoyproxy.io/docs/envoy/latest/operations/admin
  - aid: envoy:envoy-xds-api
    name: Envoy xDS APIs
    description: >-
      The xDS (x Discovery Service) APIs provide dynamic configuration for Envoy
      proxies via a management server, including LDS, RDS, CDS, EDS, SDS, and ADS.
    humanURL: https://www.envoyproxy.io/docs/envoy/latest/api-docs/xds_protocol
    tags:
      - xDS
      - Discovery Service
      - gRPC
    properties:
      - type: Documentation
        url: https://www.envoyproxy.io/docs/envoy/latest/api-docs/xds_protocol
