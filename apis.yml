aid: envoy
name: Envoy
description: Envoy is a high-performance, open-source edge and service proxy designed for cloud-native applications and microservice
  architectures. It provides advanced load balancing, observability, and traffic management features, and serves as the data
  plane for many service mesh implementations including Istio.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Cloud Native
- Load Balancing
- Proxy
- Service Mesh
url: https://www.envoyproxy.io/
