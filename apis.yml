  name: Envoy Admin API
  description: The Envoy Admin API provides local administrative access to a running Envoy proxy instance, exposing endpoints
    for inspecting clusters, listeners, configuration, statistics, health status, and runtime settings.
  humanURL: https://www.envoyproxy.io/docs/envoy/latest/operations/admin
  tags:
